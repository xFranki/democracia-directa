version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: democracia_postgres
    environment:
      POSTGRES_USER: democracia
      POSTGRES_PASSWORD: democracia123
      POSTGRES_DB: democracia_directa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: democracia_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
